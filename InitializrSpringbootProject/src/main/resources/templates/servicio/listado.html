<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/plantilla :: head}">
</head>

<body>

<header th:replace="~{fragments/plantilla :: header}"></header>
<nav th:replace="~{fragments/plantilla :: navbar}"></nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Clases de Entrenamiento</h2>
        <a th:href="@{/servicios/nuevo}" class="btn btn-primary">Agregar Clase</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Categoría</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="servicio : ${servicios}">
            <td th:text="${servicio.id}"></td>
            <td th:text="${servicio.nombre}"></td>
            <td th:text="${servicio.precio}"></td>
            <td th:text="${servicio.categoria.nombre}"></td>
            <td>
                <a th:href="@{/servicios/editar/{id}(id=${servicio.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/servicios/eliminar/{id}(id=${servicio.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<footer th:replace="~{fragments/plantilla :: footer}"></footer>

</body>
</html>
