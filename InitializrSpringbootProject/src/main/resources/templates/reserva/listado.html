<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/plantilla :: head}">
</head>

<body>

<header th:replace="~{fragments/plantilla :: header}"></header>
<nav th:replace="~{fragments/plantilla :: navbar}"></nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Reservas de Clases</h2>
        <a th:href="@{/reservas/nueva}" class="btn btn-primary">Agregar Reserva</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Fecha</th>
            <th>Clase</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="reserva : ${reservas}">
            <td th:text="${reserva.id}"></td>
            <td th:text="${reserva.nombreCliente}"></td>
            <td th:text="${reserva.fecha}"></td>
            <td th:text="${reserva.servicio.nombre}"></td>
            <td>
                <a th:href="@{/reservas/editar/{id}(id=${reserva.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/reservas/eliminar/{id}(id=${reserva.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<footer th:replace="~{fragments/plantilla :: footer}"></footer>

</body>
</html>
